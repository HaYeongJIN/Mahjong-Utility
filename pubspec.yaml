name: mahjong_dev_new
description: "A new Flutter project for Mahjong recognition."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  camera: ^0.10.5+5
  tflite_flutter: ^0.11.0
  permission_handler: ^11.0.1
  path: ^1.9.1
  path_provider: ^2.1.5
  rust_lib_mahjong_vision:
    path: rust_builder
  flutter_rust_bridge: 2.11.1
  image: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/best.tflite
    - assets/labels.txt

dependency_overrides:
  typed_data: ^1.3.2

flutter_icons:
  android: false
  ios: false